name: Update ETF Holdings

on:
  # 手動觸發(先用這個驗證來源連結是否正確)
  workflow_dispatch:
  # 每月 1 號 UTC 20:00（台灣 2 號 04:00）自動更新一次
  schedule:
    - cron: '0 20 1 * *'

permissions:
  contents: write

jobs:
  update-etf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests urllib3

      - name: Fetch ETF holdings
        env:
          # 透過代理抓 MoneyDJ;在 repo Secrets 設定 PROXY_URL 才會啟用
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python etf_fetcher.py

      - name: Fetch stock prices
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        # 股價失敗不影響成分股更新
        run: python price_fetcher.py || echo "股價抓取失敗,略過"

      - name: Fetch ETF profiles
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        # 圖鑑失敗不影響其他
        run: python etf_profile_fetcher.py || echo "ETF 圖鑑抓取失敗,略過"

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_holdings.json stock_prices.json etf_profiles.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 自動更新:ETF 成分股 + 台股收盤價 + ETF 圖鑑"
            git push
          fi
