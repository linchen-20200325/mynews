name: Daily Macro Intelligence Update

on:
  schedule:
    # 資料齊備時間(台灣):美股現貨收盤 04:00(夏令)/05:00(冬令)、台指期夜盤收盤 05:00、
    # 美股期貨近 24h 連續 → 台灣 05:00 後即有完整資料。
    # 主班次 台灣 05:30,備援 06:30、07:30(對應 UTC 21:30 / 22:30 / 23:30,皆前一日)。
    # 台灣=UTC+8,故清晨班次落在 UTC 前一日;報告日期已改用台灣時區計算,不會慢一天。
    # 刻意用「分 30、非整點、避開 UTC 午夜」— GitHub 在尖峰常延遲數十分鐘、甚至整批丟棄排程
    #(這正是 6/10、6/11 早上漏資料的主因);三班次任一成功即可,大幅降低漏報機率。
    # 防呆:主班成功產出今日報告後,後續備援班次自動略過(update_data.py 內判斷),不重複推 LINE。
    - cron: '30 21 * * *'
    - cron: '30 22 * * *'
    - cron: '30 23 * * *'
  # 允許在 GitHub 網頁手動點 "Run workflow" 測試
  workflow_dispatch:

# 自動 commit 需要寫入權限
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # 永遠在 main 上跑(排程雖由預設分支觸發,但實際 checkout + 寫回都鎖定 main)。
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run AI Data Generator
        env:
          # NAS Squid 代理:台指期夜盤(期交所 MIS 常擋境外 IP)走家用 NAS 出口;未設則自動降級直連
          PROXY_URL: ${{ secrets.PROXY_URL }}
          # Gemini 全包:讀取爬蟲抓到的真實外電 → 分析 + 白話文 + 趨勢雷達
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 多把備援金鑰(不同 Google 帳號 → 各自 20 次/日,疊加放大配額);一行一把或逗號分隔皆可
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          # LINE 推播(Messaging API);兩者皆設定才會推播
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
          # 可選:覆寫 Gemini 模型 / 分析主題 / 抓新聞關鍵字 / 關閉趨勢雷達(設 0)
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          REPORT_TOPIC: ${{ vars.REPORT_TOPIC }}
          REPORT_TOPICS: ${{ vars.REPORT_TOPICS }}
          NEWS_QUERIES: ${{ vars.NEWS_QUERIES }}
          NEWS_QUERIES_EN: ${{ vars.NEWS_QUERIES_EN }}
          TREND_QUERIES: ${{ vars.TREND_QUERIES }}
          US_TREND_QUERIES: ${{ vars.US_TREND_QUERIES }}
          STOCK_QUERIES: ${{ vars.STOCK_QUERIES }}
          STOCK_QUERIES_EN: ${{ vars.STOCK_QUERIES_EN }}
          US_STOCK_QUERIES: ${{ vars.US_STOCK_QUERIES }}
          US_STOCK_QUERIES_ZH: ${{ vars.US_STOCK_QUERIES_ZH }}
          FOCUS_TOPICS: ${{ vars.FOCUS_TOPICS }}
          ENABLE_TREND_RADAR: ${{ vars.ENABLE_TREND_RADAR }}
          ENABLE_STOCK_PICKER: ${{ vars.ENABLE_STOCK_PICKER }}
          ENABLE_US_STOCK_PICKER: ${{ vars.ENABLE_US_STOCK_PICKER }}
          ENABLE_FOCUS: ${{ vars.ENABLE_FOCUS }}
          ENABLE_HOUSING: ${{ vars.ENABLE_HOUSING }}
          # 法人籌碼(三大法人買賣超事後驗證 + 可預測賣壓事件 LINE 預告)
          ENABLE_CHIP: ${{ vars.ENABLE_CHIP }}
          ENABLE_CHIP_LINE: ${{ vars.ENABLE_CHIP_LINE }}
          CHIP_DAYS: ${{ vars.CHIP_DAYS }}
          # 多重賣壓共振預警(美股大跌 + 四力≥2 → LINE);門檻可用 vars 微調
          ENABLE_CONFLUENCE_LINE: ${{ vars.ENABLE_CONFLUENCE_LINE }}
          FORCE_FOREIGN_SELL_YI: ${{ vars.FORCE_FOREIGN_SELL_YI }}
          FORCE_MARGIN_DROP_PCT: ${{ vars.FORCE_MARGIN_DROP_PCT }}
          FORCE_YIELD_UP_BPS: ${{ vars.FORCE_YIELD_UP_BPS }}
          FORCE_DXY_UP_PCT: ${{ vars.FORCE_DXY_UP_PCT }}
        run: python update_data.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # 只 add 真的存在的產物:某些子功能未啟用時不會產檔,
          # 逐一檢查可避免 git add 遇到不存在路徑就整列報錯(exit 128)。
          for p in latest_report.json data/reports/ latest_reports.json data/reports_multi/ \
                   latest_trends.json data/trends/ latest_stocks.json data/stocks/ \
                   latest_us_stocks.json data/us_stocks/ latest_intl_alert.json data/intl_alert/ \
                   latest_chip.json data/chip/ data/chip_pushed.json latest_margin.json \
                   latest_futures_chip.json \
                   latest_focus.json data/focus/ latest_housing.json data/housing/; do
            [ -e "$p" ] && git add "$p"
          done
          # 若無變化就不 commit,避免 workflow 報錯
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 自動更新:每日政經戰略情報"
            git push origin HEAD:main
          fi
