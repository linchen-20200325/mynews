name: Daily Macro Intelligence Update

on:
  schedule:
    # UTC 00:00 = 台灣時間 08:00。注意 GitHub Actions 排程常有數分鐘~數十分鐘延遲。
    - cron: '0 0 * * *'
  # 允許在 GitHub 網頁手動點 "Run workflow" 測試
  workflow_dispatch:

# 自動 commit 需要寫入權限
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run AI Data Generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 可選:在 repo variables 設定 REPORT_TOPIC 覆寫預設主題
          REPORT_TOPIC: ${{ vars.REPORT_TOPIC }}
        run: python update_data.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_report.json data/reports/
          # 若無變化就不 commit,避免 workflow 報錯
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 自動更新:每日政經戰略情報"
            git push
          fi
